# ─────────────────────────────────────────────────────────────────────────────
#  Minouverse – docker-compose.yml
#  Lance le backend Flask (port 5000) et le frontend Next.js (port 3000).
#  La base de données est hébergée sur Supabase (cloud) – pas de conteneur DB.
#
#  Usage :
#    docker-compose up --build        # premier lancement
#    docker-compose up                # lancement suivant (images en cache)
#    docker-compose down              # arrêt et suppression des conteneurs
#    docker-compose logs -f backend   # logs en temps réel du backend
# ─────────────────────────────────────────────────────────────────────────────
 
services:
 
  # ── Backend Flask ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Flask
      dockerfile: Dockerfile
    container_name: minouverse_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./Flask/.flaskenv
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
    volumes:
      # Monte le code source pour le rechargement à chaud en développement
      - ./Flask:/app
      # Exclut le dossier de cache Python du montage
      - /app/__pycache__
    networks:
      - minouverse_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
 
  # ── Frontend Next.js ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Nextjs
      dockerfile: Dockerfile
    container_name: minouverse_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./Nextjs/.env.local
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_FLASK_API_URL=http://localhost:5000
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_WEBSOCKET_URL=http://localhost:5000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - minouverse_network
 
networks:
  minouverse_network:
    driver: bridge