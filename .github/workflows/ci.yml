name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Tests Unitaires
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd Flask
        pip install -r requirements.txt
    
    - name: Run unit tests
      run: |
        cd Flask
        python -m pytest tests/test_unit_*.py -v --cov=. --cov-report=xml --cov-report=term
    
    - name: Upload unit test coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./Flask/coverage.xml
        flags: unit-tests
        name: unit-tests-coverage
      if: always()

  integration-tests:
    name: Tests d'Intégration
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd Flask
        pip install -r requirements.txt
    
    - name: Run integration tests
      run: |
        cd Flask
        python -m pytest tests/test_integration_*.py -v --cov=. --cov-report=xml --cov-report=term
    
    - name: Upload integration test coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./Flask/coverage.xml
        flags: integration-tests
        name: integration-tests-coverage
      if: always()

  backend:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd Flask
        pip install -r requirements.txt
    
    - name: Check Python syntax
      run: |
        cd Flask
        python -m py_compile app.py

  frontend:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-key
      NEXTAUTH_SECRET: dummy-secret-for-ci
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
      STRIPE_SECRET_KEY: sk_test_dummy
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        cd Nextjs
        npm ci
    
    - name: Lint
      run: |
        cd Nextjs
        npm run lint || true
    
    - name: Build
      run: |
        cd Nextjs
        npm run build
